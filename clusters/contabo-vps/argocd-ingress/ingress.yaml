# Requiere que argocd-server corra con --insecure (ver 02-install-argocd.sh),
# si no hay un loop de redirects contra este Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.kinforgeworks.com
  rules:
    - host: argocd.kinforgeworks.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
