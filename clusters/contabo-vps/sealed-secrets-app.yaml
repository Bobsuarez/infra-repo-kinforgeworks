# Componente de plataforma (no un producto), por eso vive en clusters/ y no en
# apps/*: el ApplicationSet de root-app.yaml solo descubre carpetas de apps/.
# Permite commitear Secrets cifrados (SealedSecret) en apps/**/secret.sealed.yaml
# de forma segura; el controller los descifra dentro del clúster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bobsuarez/infra-repo-kinforgeworks.git
    targetRevision: master
    path: clusters/contabo-vps/sealed-secrets
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
