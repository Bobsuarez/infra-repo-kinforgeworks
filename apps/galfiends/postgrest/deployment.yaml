# API PostgREST expuesta directamente al frontend. Requiere una base
# PostgreSQL propia de galfiends (aislada de la de maestrias) - si aún no
# existe, agregar aquí un StatefulSet+PVC de postgres antes de desplegar esto.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: galfiends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgrest
  template:
    metadata:
      labels:
        app: postgrest
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:latest
          envFrom:
            - secretRef:
                name: galfiends-postgrest-secrets # PGRST_DB_URI, PGRST_DB_SCHEMA, etc.
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
  namespace: galfiends
spec:
  selector:
    app: postgrest
  ports:
    - port: 3000
      targetPort: 3000
