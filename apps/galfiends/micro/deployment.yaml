# TODO: reemplazar image por la ruta real en GHCR una vez exista el workflow de build/push.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro
  namespace: galfiends
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro
  template:
    metadata:
      labels:
        app: micro
    spec:
      containers:
        - name: micro
          image: ghcr.io/bobsuarez/galfiends-micro:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: galfiends-micro-secrets # crear manualmente / sealed-secret (ver README "Pendientes")
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
