apiVersion: apps/v1
kind: Deployment
metadata:
  name: leads
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leads
  template:
    metadata:
      labels:
        app: leads
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret # ver README "Gestión de Secrets" - dockerconfigjson sellado
      containers:
        - name: leads
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          image: ghcr.io/bobsuarez/kindredworks/em-leads:latest
          ports:
            - containerPort: 8080 # el server.port real de Spring (no 8085: ese era el puerto de host de podman-compose)
          env:
            # No son secretos: URL interna del cluster y un client id de OAuth público.
            - name: EM_LEADS_PROCESSOR_GATEWAY_URL
              value: http://leadsprocessor:8080/api/
            - name: GOOGLE_CLIENT_ID
              value: "510282063986-644dne1km3uu8c2705fe35l1l1fuhaim.apps.googleusercontent.com"
          envFrom:
            - secretRef:
                name: maestrias-db-credentials # compartido, ver postgrest/statefulset.yaml
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 400m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: leads
  namespace: maestrias
spec:
  selector:
    app: leads
  ports:
    - port: 8080
      targetPort: 8080
