# Consumer RabbitMQ -> email/WhatsApp. Sin Ingress: no se expone al público.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadsdelivery
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leadsdelivery
  template:
    metadata:
      labels:
        app: leadsdelivery
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: leadsdelivery
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          image: ghcr.io/bobsuarez/kindredworks/em-leads-delivery:latest
          ports:
            - containerPort: 8080 # server.port real de Spring (no 8082)
          env:
            # No son secretos: URL interna del cluster y nombre de cola.
            - name: WHATSAPP_GATEWAY_URL
              value: http://whatsapp-gateway:3000/api/
            - name: RABBITMQ_LEADS_QUEUE
              value: leads-notification-queue
          envFrom:
            - secretRef:
                name: maestrias-db-credentials # compartido, ver postgrest/statefulset.yaml
            - secretRef:
                name: maestrias-leadsdelivery-secrets # MAIL_* (lo único genuinamente sensible acá)
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: leadsdelivery
  namespace: maestrias
spec:
  selector:
    app: leadsdelivery
  ports:
    - port: 8080
      targetPort: 8080
