# ETL Python (Excel/CSV -> PostgreSQL), consumer long-running de RabbitMQ.
# No expone puerto: sin Service ni Ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          image: ghcr.io/bobsuarez/kindredworks/em-worker:latest
          envFrom:
            - secretRef:
                name: maestrias-worker-secrets
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
