apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          image: ghcr.io/bobsuarez/kindredworks/em-web:latest
          ports:
            - containerPort: 4321
          envFrom:
            - secretRef:
                name: maestrias-web-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: maestrias
spec:
  selector:
    app: web
  ports:
    - port: 4321
      targetPort: 4321
