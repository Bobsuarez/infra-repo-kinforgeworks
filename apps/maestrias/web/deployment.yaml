apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: web
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          # Sin env/secrets: PUBLIC_API_URL y PUBLIC_GOOGLE_CLIENT_ID son
          # variables de build-time de Astro (se hornean en el bundle JS al
          # compilar la imagen), no de runtime - el compose.yaml real de
          # em-web no declara ningún environment:. El .env con PUBLIC_* es
          # solo para desarrollo local (astro dev), no aplica en el pod.
          image: ghcr.io/bobsuarez/kindredworks/em-web:latest
          ports:
            - containerPort: 4321
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: maestrias
spec:
  selector:
    app: web
  ports:
    - port: 4321
      targetPort: 4321
