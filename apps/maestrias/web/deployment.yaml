apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/bobsuarez/em-web:latest
          ports:
            - containerPort: 4321
          envFrom:
            - secretRef:
                name: maestrias-web-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: maestrias
spec:
  selector:
    app: web
  ports:
    - port: 4321
      targetPort: 4321
