# Gateway HTTP -> WhatsApp Web, llamado internamente por leadsdelivery. Sin Ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whatsapp-gateway
  namespace: maestrias
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whatsapp-gateway
  template:
    metadata:
      labels:
        app: whatsapp-gateway
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: whatsapp-gateway
          # Nombre real del contenedor en KindredWorks es "em-whatsapp-web"
          # (ver CLAUDE.md), no "em-whatsapp-gateway".
          # TODO: confirmar si :latest existe como tag flotante (el pipeline
          # publica sha-<corto>@sha256:<digest>); si no, fijar un sha real.
          image: ghcr.io/bobsuarez/kindredworks/em-whatsapp-web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: maestrias-whatsapp-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: whatsapp-gateway
  namespace: maestrias
spec:
  selector:
    app: whatsapp-gateway
  ports:
    - port: 3000
      targetPort: 3000
