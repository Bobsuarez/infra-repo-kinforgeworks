# Nota de nombre: esta carpeta se llama "postgrest" por continuidad con el
# monorepo de la app (european-masters/postgrest/), pero contiene el motor
# PostgreSQL en si (primary), no la herramienta PostgREST. Aislado del
# postgres/minio de galfields a propósito (ver README - Namespace por proyecto).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-primary-data
  namespace: maestrias
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi # TODO: ajustar según tamaño real de la DB de leads
