# TODO: la réplica de solo lectura (em-db-replica) queda pendiente de agregar
# como segundo StatefulSet una vez definida la estrategia de streaming replication.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-primary
  namespace: maestrias
spec:
  serviceName: db-primary
  replicas: 1
  selector:
    matchLabels:
      app: db-primary
  template:
    metadata:
      labels:
        app: db-primary
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef:
                name: maestrias-db-secrets # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-primary-data
---
apiVersion: v1
kind: Service
metadata:
  name: db-primary
  namespace: maestrias
spec:
  selector:
    app: db-primary
  ports:
    - port: 5432
      targetPort: 5432
