apiVersion: v1
kind: ResourceQuota
metadata:
  name: galfields-quota
  namespace: galfields
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 2Gi
    limits.cpu: "8" # con db-replica (800m) la suma de límites queda en
    # 6050m; se deja ~30% de margen sobre el hard cap (ver README -
    # Presupuesto de recursos) para que quepa el pod extra de un rolling
    # update sin el deadlock de FailedCreate que ya nos pasó dos veces
    limits.memory: 7Gi # suma de límites queda en 5120Mi, mismo criterio de margen
---
apiVersion: v1
kind: LimitRange
metadata:
  name: galfields-limits
  namespace: galfields
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 250m
        memory: 256Mi
