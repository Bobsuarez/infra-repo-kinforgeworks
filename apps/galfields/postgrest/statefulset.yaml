apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: db-primary
  namespace: galfields
spec:
  serviceName: db-primary
  replicas: 1
  selector:
    matchLabels:
      app: db-primary
  template:
    metadata:
      labels:
        app: db-primary
    spec:
      containers:
        - name: postgres
          # postgres:15-alpine (no 16) para coincidir con la versión ya
          # probada en el compose.yaml de pos-backend - streaming
          # replication exige que primario y réplica sean la misma versión
          # mayor, así que conviene alinear desde ya aunque la réplica se
          # agregue después.
          image: postgres:15-alpine
          envFrom:
            - secretRef:
                name: galfields-db-credentials # compartido con micro (pos-backend)
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            # Se ejecuta solo la primera vez (volumen de datos vacío). Ver
            # init-schema-configmap.yaml: es un stand-in hasta que existan
            # migraciones Flyway reales en el repo de pos-backend.
            - name: init-schema
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 1500m # antes 400m: Postgres quedaba fuertemente
              # throttled (cgroup cpu.stat mostraba ~44% del tiempo
              # bloqueado) en cada query durante la creación de productos
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-primary-data
        - name: init-schema
          configMap:
            name: db-primary-init-schema
---
apiVersion: v1
kind: Service
metadata:
  name: db-primary
  namespace: galfields
spec:
  selector:
    app: db-primary
  ports:
    - port: 5432
      targetPort: 5432
