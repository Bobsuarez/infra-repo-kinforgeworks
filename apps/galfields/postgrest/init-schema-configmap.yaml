# Traducción MySQL -> PostgreSQL de pos_database.sql, SOLO para poder
# probar pos-backend ya mientras no existan migraciones Flyway reales en
# su repo (ver README - Pendientes). Cuando esas migraciones existan,
# borrar este ConfigMap (y probablemente recrear el PVC) para que Flyway
# quede como única fuente de verdad del schema, sin conflictos.
#
# Traducciones aplicadas: AUTO_INCREMENT -> SERIAL, ENUM inline -> tipos
# ENUM nombrados, ON UPDATE CURRENT_TIMESTAMP -> triggers, DATETIME ->
# TIMESTAMP, nombres de tabla/columna a snake_case (convención más común
# en Hibernate/Postgres). No hay garantía de que coincida exactamente con
# las entidades JPA reales - si Hibernate se queja en el arranque
# (ddl-auto=validate), el error va a decir qué tabla/columna ajustar.
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-primary-init-schema
  namespace: galfields
data:
  01_schema.sql: |
    CREATE
    OR REPLACE FUNCTION set_updated_at() RETURNS TRIGGER AS $$
    BEGIN
        NEW.updated_at
    = CURRENT_TIMESTAMP;
    RETURN NEW;
    END;
        $$
    LANGUAGE plpgsql;

        CREATE
    OR REPLACE FUNCTION set_last_updated() RETURNS TRIGGER AS $$
    BEGIN
        NEW.last_updated
    = CURRENT_TIMESTAMP;
    RETURN NEW;
    END;
        $$
    LANGUAGE plpgsql;

    CREATE TYPE payment_status_enum AS ENUM ('Pending', 'Paid', 'Partial', 'Cancelled');
    CREATE TYPE purchase_order_status_enum AS ENUM ('Pending', 'Received', 'Cancelled', 'Partial');

    -- 1. Tablas de referencia y configuración
    CREATE TABLE categories
    (
        category_id BIGSERIAL PRIMARY KEY,
        name        VARCHAR(100) NOT NULL,
        description TEXT,
        created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE brands
    (
        brand_id   BIGSERIAL PRIMARY KEY,
        name       VARCHAR(100) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE employee_roles
    (
        role_id     BIGSERIAL PRIMARY KEY,
        role_name   VARCHAR(50) NOT NULL,
        permissions JSONB,
        created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE payment_methods
    (
        payment_method_id BIGSERIAL PRIMARY KEY,
        method_name       VARCHAR(50) NOT NULL,
        is_active         BOOLEAN   DEFAULT TRUE,
        created_at        TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );


    CREATE TABLE payment_methods_images
    (
        id               BIGSERIAL PRIMARY KEY,
        payment_methods  BIGINT UNIQUE NOT NULL REFERENCES payment_methods (payment_method_id),
        image_product    BIGINT        NOT NULL REFERENCES attach_files (attach_files_id),
        create_at        timestamp DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE attach_files
    (
        attach_files_id BIGSERIAL PRIMARY KEY,
        name            varchar(255) NOT NULL,
        url             text         NOT NULL,
        mime_type       varchar(100) NOT NULL,
        size            INT          NOT NULL,
        create_at       timestamp DEFAULT CURRENT_TIMESTAMP
    );


    CREATE TABLE locations
    (
        location_id BIGSERIAL PRIMARY KEY,
        name        VARCHAR(100) NOT NULL,
        address     TEXT,
        phone       VARCHAR(20),
        created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- 2. Personas (empleados, clientes, proveedores)
    CREATE TABLE employees
    (
        employee_id   BIGSERIAL PRIMARY KEY,
        first_name    VARCHAR(50)        NOT NULL,
        last_name     VARCHAR(50)        NOT NULL,
        username      VARCHAR(50) UNIQUE NOT NULL,
        password_hash VARCHAR(255)       NOT NULL,
        role_id       BIGINT REFERENCES employee_roles (role_id),
        logo_image    BIGINT REFERENCES attach_files (attach_files_id),
        is_active     BOOLEAN   DEFAULT TRUE,
        created_at    TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE customers
    (
        customer_id    BIGSERIAL PRIMARY KEY,
        first_name     VARCHAR(50) NOT NULL,
        last_name      VARCHAR(50) NOT NULL,
        email          VARCHAR(100) UNIQUE,
        phone_number   VARCHAR(20),
        address        TEXT,
        loyalty_points INT       DEFAULT 0,
        created_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE suppliers
    (
        supplier_id    BIGSERIAL PRIMARY KEY,
        name           VARCHAR(100) NOT NULL,
        contact_person VARCHAR(100),
        phone_number   VARCHAR(20),
        email          VARCHAR(100),
        address        TEXT,
        created_at     TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    -- 3. Productos y variantes
    CREATE TABLE products
    (
        product_id  BIGSERIAL PRIMARY KEY,
        name        VARCHAR(150) NOT NULL,
        description TEXT,
        category_id BIGINT REFERENCES categories (category_id),
        brand_id    BIGINT REFERENCES brands (brand_id),
        is_active   BOOLEAN   DEFAULT TRUE,
        created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    CREATE TRIGGER trg_products_updated_at
        BEFORE UPDATE
        ON products
        FOR EACH ROW EXECUTE FUNCTION set_updated_at();

    CREATE TABLE product_images
    (
        id            BIGSERIAL PRIMARY KEY,
        product_id    BIGINT UNIQUE NOT NULL REFERENCES products (product_id),
        image_product BIGINT        NOT NULL REFERENCES attach_files (attach_files_id),
        create_at     timestamp DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE product_variants
    (
        variant_id BIGSERIAL PRIMARY KEY,
        product_id BIGINT          NOT NULL REFERENCES products (product_id),
        sku        VARCHAR(50) UNIQUE NOT NULL,
        price      DECIMAL(15, 2)     NOT NULL,
        cost_price DECIMAL(15, 2)     NOT NULL,
        barcode    VARCHAR(100) UNIQUE,
        is_active  BOOLEAN DEFAULT TRUE
    );

    CREATE TABLE variant_attributes
    (
        variant_attribute_id BIGSERIAL PRIMARY KEY,
        variant_id           BIGINT   NOT NULL REFERENCES product_variants (variant_id) ON DELETE CASCADE,
        attribute_name       VARCHAR(50) NOT NULL,
        attribute_value      VARCHAR(50) NOT NULL,
        UNIQUE (variant_id, attribute_name) -- Una variante no puede tener el mismo atributo dos veces
    );


    CREATE TABLE product_variants_images
    (
        id               BIGSERIAL PRIMARY KEY,
        product_variants BIGINT UNIQUE NOT NULL REFERENCES product_variants (variant_id),
        image_product    BIGINT        NOT NULL REFERENCES attach_files (attach_files_id),
        create_at        timestamp DEFAULT CURRENT_TIMESTAMP
    );

    -- 4. Inventario por ubicación
    CREATE TABLE inventory
    (
        inventory_id     BIGSERIAL PRIMARY KEY,
        variant_id       BIGINT NOT NULL REFERENCES product_variants (variant_id),
        location_id      BIGINT NOT NULL REFERENCES locations (location_id),
        quantity_on_hand INT       DEFAULT 0,
        last_updated     TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        UNIQUE (variant_id, location_id)
    );
    CREATE TRIGGER trg_inventory_last_updated
        BEFORE UPDATE
        ON inventory
        FOR EACH ROW EXECUTE FUNCTION set_last_updated();

    -- 5. Transacciones de venta
    CREATE TABLE sales_transactions
    (
        transaction_id   BIGSERIAL PRIMARY KEY,
        transaction_date TIMESTAMP           DEFAULT CURRENT_TIMESTAMP,
        employee_id      BIGINT      NOT NULL REFERENCES employees (employee_id),
        customer_id      BIGINT REFERENCES customers (customer_id),
        total_amount     DECIMAL(15, 2) NOT NULL,
        discount_amount  DECIMAL(15, 2)      DEFAULT 0,
        tax_amount       DECIMAL(15, 2)      DEFAULT 0,
        payment_status   payment_status_enum DEFAULT 'Pending',
        location_id      BIGINT      NOT NULL REFERENCES locations (location_id)
    );

    CREATE TABLE sale_items
    (
        sale_item_id      BIGSERIAL PRIMARY KEY,
        transaction_id    BIGINT      NOT NULL REFERENCES sales_transactions (transaction_id),
        variant_id        BIGINT      NOT NULL REFERENCES product_variants (variant_id),
        quantity          INT            NOT NULL,
        unit_price        DECIMAL(15, 2) NOT NULL,
        discount_per_item DECIMAL(15, 2) DEFAULT 0,
        subtotal          DECIMAL(15, 2) NOT NULL
    );

    CREATE TABLE payments
    (
        payment_id        BIGSERIAL PRIMARY KEY,
        transaction_id    BIGINT      NOT NULL REFERENCES sales_transactions (transaction_id),
        payment_method_id BIGINT      NOT NULL REFERENCES payment_methods (payment_method_id),
        amount            DECIMAL(15, 2) NOT NULL,
        payment_date      TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        reference_number  VARCHAR(100)
    );

    -- 6. Órdenes de compra (abastecimiento)
    CREATE TABLE purchase_orders
    (
        purchase_order_id      BIGSERIAL PRIMARY KEY,
        supplier_id            BIGINT      NOT NULL REFERENCES suppliers (supplier_id),
        order_date             TIMESTAMP                  DEFAULT CURRENT_TIMESTAMP,
        expected_delivery_date TIMESTAMP,
        status                 purchase_order_status_enum DEFAULT 'Pending',
        total_amount           DECIMAL(15, 2) NOT NULL
    );

    CREATE TABLE purchase_order_items
    (
        po_item_id        BIGSERIAL PRIMARY KEY,
        purchase_order_id BIGINT      NOT NULL REFERENCES purchase_orders (purchase_order_id),
        variant_id        BIGINT      NOT NULL REFERENCES product_variants (variant_id),
        quantity          INT            NOT NULL,
        cost_price        DECIMAL(15, 2) NOT NULL,
        received_quantity INT DEFAULT 0
    );


    -- 7. Índices
    -- En tablas de Personas y Productos
    CREATE INDEX idx_employees_role_id ON employees (role_id);
    CREATE INDEX idx_products_category_id ON products (category_id);
    CREATE INDEX idx_products_brand_id ON products (brand_id);
    CREATE INDEX idx_product_variants_product_id ON product_variants (product_id);

    -- En Transacciones de Venta (Vital para el módulo de facturación y reportes)
    CREATE INDEX idx_sales_transactions_employee_id ON sales_transactions (employee_id);
    CREATE INDEX idx_sales_transactions_customer_id ON sales_transactions (customer_id);
    CREATE INDEX idx_sales_transactions_location_id ON sales_transactions (location_id);

    -- En el Detalle de Ventas e Inventario
    CREATE INDEX idx_sale_items_transaction_id ON sale_items (transaction_id);
    CREATE INDEX idx_sale_items_variant_id ON sale_items (variant_id);
    CREATE INDEX idx_payments_transaction_id ON payments (transaction_id);
    CREATE INDEX idx_payments_method_id ON payments (payment_method_id);

    -- En Compras / Abastecimiento
    CREATE INDEX idx_purchase_orders_supplier_id ON purchase_orders (supplier_id);
    CREATE INDEX idx_purchase_order_items_po_id ON purchase_order_items (purchase_order_id);
    CREATE INDEX idx_purchase_order_items_variant_id ON purchase_order_items (variant_id);

    -- 1. Indexar stock por sucursal y variante
    CREATE INDEX idx_inventory_location_variant ON inventory (location_id, variant_id);

    -- 2. Indexar ventas por sucursal e historial de fechas
    CREATE INDEX idx_sales_location_date ON sales_transactions (location_id, transaction_date);

    -- 3. Indexar búsquedas de atributos de productos
    CREATE INDEX idx_variant_attributes_lookup ON variant_attributes (attribute_name, attribute_value);

    -- 4. Índice optimizado para Login de empleados activos
    CREATE INDEX idx_employees_login ON employees (username) WHERE is_active = TRUE;
  02_seed_data.sql: |
    -- Datos semilla de las tablas de referencia/configuración, orientados a
    -- una tienda de barrio colombiana (licor, paquetes, dulces, tintos,
    -- cigarrillos...). Solo para tener el POS con algo que mostrar mientras
    -- no hay datos reales - mismo criterio que 01_schema.sql: stand-in hasta
    -- que exista una fuente real (Flyway o carga de datos del negocio).
    --
    -- TRUNCATE ... CASCADE al principio: idempotente incluso si se corre
    -- contra una base con datos de prueba previos (arrastra products,
    -- product_variants, product_images e inventory, que dependen de
    -- categories/brands/locations).
    TRUNCATE categories, brands, locations RESTART IDENTITY CASCADE;

